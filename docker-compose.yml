version: '3.9'

services:
  bjsoft-website:
    build: .
    container_name: bjsoft-landing
    restart: unless-stopped
    networks:
      - network_public
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.bjsoft.rule=Host(`www.bjsoft.com.br`) || Host(`bjsoft.com.br`)'
      - 'traefik.http.routers.bjsoft.entrypoints=websecure'
      - 'traefik.http.routers.bjsoft.tls.certresolver=letsencrypt'
      - 'traefik.http.services.bjsoft.loadbalancer.server.port=80'
      # Redirecionamento automático de HTTP para HTTPS (Traefik 2.x+)
      - 'traefik.http.routers.bjsoft-http.rule=Host(`www.bjsoft.com.br`) || Host(`bjsoft.com.br`)'
      - 'traefik.http.routers.bjsoft-http.entrypoints=web'
      - 'traefik.http.routers.bjsoft-http.middlewares=redirect-to-https'
      - 'traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https'

networks:
  network_public:
    external: true
